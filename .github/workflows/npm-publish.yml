name: Publish NPM Package on Tag

on:
  push:
    tags:
      - '*.*.*'  # fires on tags like 1.0.0, v2.1.3, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Coverage run enforces the jest coverageThreshold gate before publish
      - run: npm run test:coverage
      - run: npm run lint
      - run: npm run format:check

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm --provenance (SLSA attestation)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org/

      # OIDC trusted publishing requires npm >= 11.5.1; Node 20 ships npm 10.x.
      - name: Upgrade npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          TAG_VERSION=${TAG_VERSION#v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag: $TAG_VERSION / package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION). Bump package.json before tagging."
            exit 1
          fi

      - name: Dry-run (shows what would be published)
        run: npm publish --dry-run

      # Trusted Publishing (OIDC): no NODE_AUTH_TOKEN needed — npm authenticates
      # via the GitHub OIDC id-token. Provenance is generated automatically.
      - name: Publish to NPM (trusted publishing via OIDC)
        run: npm publish --access public
