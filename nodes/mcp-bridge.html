<script type="text/javascript">
    RED.nodes.registerType('mcp-bridge', {
        category: 'condition-monitoring',
        color: '#5fb1d6',
        defaults: {
            name:         { value: "" },
            sensorName:   { value: "", required: true },
            bufferSize:   { value: 1024, validate: RED.validators.number() },
            unit:         { value: "" },
            samplingHz:   { value: "" },
            persistState: { value: true },

            // Server-level (only the first node's values are used)
            serverPort:   { value: 3001, validate: RED.validators.number() },
            serverHost:   { value: "127.0.0.1" },
            serverPath:   { value: "/mcp" }
        },
        credentials: {
            authToken: { type: "password" }
        },
        inputs: 1,
        outputs: 0,
        icon: "font-awesome/fa-share-alt",
        label: function () {
            return this.name || (this.sensorName ? "mcp: " + this.sensorName : "mcp-bridge");
        },
        labelStyle: function () {
            return this.name ? "node_label_italic" : "";
        },
        paletteLabel: "mcp-bridge"
    });
</script>

<script type="text/html" data-template-name="mcp-bridge">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Optional editor label">
    </div>

    <h4 style="margin-top:14px;">Sensor</h4>

    <div class="form-row">
        <label for="node-input-sensorName"><i class="fa fa-thermometer-half"></i> Sensor name</label>
        <input type="text" id="node-input-sensorName" placeholder="e.g. machine-A/temp">
    </div>
    <div class="form-row">
        <label for="node-input-bufferSize"><i class="fa fa-database"></i> Buffer size</label>
        <input type="number" id="node-input-bufferSize" placeholder="1024" min="1" max="100000">
    </div>
    <div class="form-row">
        <label for="node-input-unit"><i class="fa fa-balance-scale"></i> Unit</label>
        <input type="text" id="node-input-unit" placeholder="e.g. °C, mm/s">
    </div>
    <div class="form-row">
        <label for="node-input-samplingHz"><i class="fa fa-clock-o"></i> Sampling Hz</label>
        <input type="number" id="node-input-samplingHz" step="any" placeholder="e.g. 1.0">
    </div>
    <div class="form-row">
        <label></label>
        <input type="checkbox" id="node-input-persistState" style="display:inline-block;width:auto;vertical-align:top;">
        <label for="node-input-persistState" style="width:auto;">Persist buffer across restart</label>
    </div>

    <h4 style="margin-top:14px;">MCP server (first node wins)</h4>

    <div class="form-row">
        <label for="node-input-serverHost"><i class="fa fa-server"></i> Bind address</label>
        <input type="text" id="node-input-serverHost" placeholder="127.0.0.1">
    </div>
    <div class="form-row">
        <label for="node-input-serverPort"><i class="fa fa-plug"></i> Port</label>
        <input type="number" id="node-input-serverPort" min="1" max="65535" placeholder="3001">
    </div>
    <div class="form-row">
        <label for="node-input-serverPath"><i class="fa fa-link"></i> HTTP path</label>
        <input type="text" id="node-input-serverPath" placeholder="/mcp">
    </div>
    <div class="form-row">
        <label for="node-input-authToken"><i class="fa fa-key"></i> Bearer token</label>
        <input type="password" id="node-input-authToken" placeholder="required">
    </div>

    <div class="form-tips" style="margin-top:14px;">
        <b>Heads up.</b> Binding to <code>0.0.0.0</code> exposes the MCP server on every interface — use only behind a trusted network or reverse proxy. Tokens are stored as Node-RED credentials (encrypted on disk).
    </div>
</script>

<script type="text/html" data-help-name="mcp-bridge">
    <p>Bridges this Node-RED flow's live sensor data to external Model-Context-Protocol clients
    (Claude Desktop, Cursor, claude.ai, Claude Code). The node buffers samples and exposes
    read-only tools that the LLM client can call on demand.</p>

    <p>No model is loaded inside Node-RED. Inference, forecasting and explanation happen on
    the client side; this bridge only ships data and cheap statistics.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number | numeric string</span></dt>
        <dd>The sample value. Non-numeric or non-finite payloads are dropped with a status warning.</dd>

        <dt class="optional">timestamp <span class="property-type">number</span></dt>
        <dd>Epoch milliseconds. Defaults to <code>Date.now()</code>.</dd>

        <dt class="optional">isAnomaly <span class="property-type">boolean</span></dt>
        <dd>Surfaced via the <code>getMetadata</code> tool so an LLM client can see what upstream nodes already flagged.</dd>

        <dt class="optional">zScore <span class="property-type">number</span></dt>
        <dd>Same as above — last upstream Z-score is exposed via <code>getMetadata</code>.</dd>
    </dl>

    <h3>MCP tools exposed</h3>
    <ul>
        <li><code>listSensors()</code> — every sensor registered with the bridge.</li>
        <li><code>getRecentSamples(sensor, n)</code> — most recent N samples + timestamps.</li>
        <li><code>getStats(sensor, windowMin)</code> — count, mean, stdDev, min/max, quartiles.</li>
        <li><code>getMetadata(sensor)</code> — unit, sampling rate, last upstream anomaly flags.</li>
    </ul>

    <h3>Connecting from a client</h3>
    <p>Configure the client with the URL <code>http://&lt;host&gt;:&lt;port&gt;/mcp</code> and an
    HTTP <code>Authorization: Bearer &lt;token&gt;</code> header using the token you set above.
    Streamable-HTTP transport, JSON or text/event-stream Accept header.</p>

    <h3>Singleton manager</h3>
    <p>All <code>mcp-bridge</code> nodes share one HTTP server. The first node to deploy sets
    port, host, path and bearer token. Subsequent nodes that disagree on these values
    log an <code>option mismatch</code> warning — first writer wins.</p>

    <h3>Requirements</h3>
    <p>Install the optional dependency: <code>npm install @modelcontextprotocol/sdk</code>.</p>
</script>
