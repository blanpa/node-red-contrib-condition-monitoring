<script type="text/javascript">
    RED.nodes.registerType('json-source', {
        category: 'Condition Monitoring Demo',
        color: '#9482f1',
        defaults: {
            name: { value: "" },
            fields: { value: '{\n  "temperature": { "mean": 60, "noise": 2, "trend": 0.05, "min": 0, "max": 150 },\n  "pressure": { "mean": 4.5, "noise": 0.15, "min": 0 },\n  "vibration": { "mean": 2.0, "noise": 0.3, "trend": 0.02, "min": 0 },\n  "asset": "pump-01"\n}' },
            anomalyChance: { value: 0, validate: RED.validators.number() },
            anomalyMag: { value: 6, validate: RED.validators.number() },
            intervalMs: { value: 1000, validate: RED.validators.number() },
            autoStart: { value: false },
            outputProperty: { value: "payload" },
            outputTopic: { value: "" },
            seed: { value: "" }
        },
        inputs: 1,
        outputs: 1,
        icon: "icon.png",
        label: function () { return this.name || "json-source"; },
        labelStyle: function () { return this.name ? "node_label_italic" : ""; },
        paletteLabel: "CM JSON Source",
        oneditprepare: function () {
            this.editor = RED.editor.createEditor({
                id: 'node-input-fields-editor',
                mode: 'ace/mode/json',
                value: $("#node-input-fields").val()
            });
        },
        oneditsave: function () {
            $("#node-input-fields").val(this.editor.getValue());
            this.editor.destroy();
        },
        oneditcancel: function () {
            this.editor.destroy();
        }
    });
</script>

<script type="text/html" data-template-name="json-source">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-outputProperty"><i class="fa fa-sign-out"></i> Output</label>
        <input type="text" id="node-input-outputProperty" placeholder="payload" style="width:120px">
        <label for="node-input-outputTopic" style="margin-left:10px">Topic</label>
        <input type="text" id="node-input-outputTopic" placeholder="json-source" style="width:120px">
    </div>
    <div class="form-row" style="margin-bottom:0">
        <label for="node-input-fields"><i class="fa fa-code"></i> Fields (JSON)</label>
    </div>
    <div class="form-row node-text-editor-row">
        <div style="height:200px; min-height:150px;" class="node-text-editor" id="node-input-fields-editor"></div>
    </div>
    <input type="hidden" id="node-input-fields">
    <div class="form-row">
        <label for="node-input-anomalyChance"><i class="fa fa-bolt"></i> Anomaly %</label>
        <input type="number" id="node-input-anomalyChance" min="0" max="1" step="0.05" style="width:80px">
        <label for="node-input-anomalyMag" style="margin-left:10px">spike σ</label>
        <input type="number" id="node-input-anomalyMag" min="0" step="0.5" style="width:80px">
    </div>
    <div class="form-row">
        <label for="node-input-autoStart" style="width:auto"><i class="fa fa-play"></i> Auto-start</label>
        <input type="checkbox" id="node-input-autoStart" style="width:auto;vertical-align:middle">
        <label for="node-input-intervalMs" style="margin-left:10px">interval (ms)</label>
        <input type="number" id="node-input-intervalMs" min="50" style="width:90px">
    </div>
    <div class="form-row">
        <label for="node-input-seed"><i class="fa fa-dice"></i> Seed</label>
        <input type="number" id="node-input-seed" placeholder="empty = random" style="width:120px">
    </div>
</script>

<script type="text/html" data-help-name="json-source">
    <p>Generic structured-data (JSON record) simulator — drives the nodes that
    consume objects/records (multi-value-processor, health-index, pca-anomaly,
    anomaly-detector multi-sensor, training-data-collector, llm-analyzer record).</p>
    <h3>Fields spec</h3>
    <p>A JSON object mapping field name → spec. A numeric field is
    <code>{ "mean": .., "noise": .., "trend": .., "min": .., "max": .. }</code>
    (value = mean + trend·count + gaussian(noise)); a string/number is emitted as a
    constant.</p>
    <h3>Output</h3>
    <ul>
        <li><code>msg.payload</code> — the simulated record object</li>
        <li><code>msg.anomalyInjected</code> — field name when an anomaly spike was injected</li>
    </ul>
    <h3>Control</h3>
    <p>Any input emits one record. <code>"start"</code>/<code>"stop"</code>/<code>"reset"</code>
    control streaming (or Auto-start). <code>msg.config</code> adjusts anomalyChance/fields live.</p>
</script>
