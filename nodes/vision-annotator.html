<script type="text/javascript">
    RED.nodes.registerType('vision-annotator', {
        category: 'Condition Monitoring Vision',
        color: '#9482f1',
        defaults: {
            name: { value: "" },
            mode: { value: "boxes" },
            inputProperty: { value: "prediction" },
            shapeProperty: { value: "mlInference.outputShape" },
            imageProperty: { value: "image" },
            canvasWidth: { value: 128, validate: RED.validators.number() },
            canvasHeight: { value: 128, validate: RED.validators.number() },
            alpha: { value: 0.5, validate: RED.validators.number() },
            boxFormat: { value: "xyxy" },
            scoreThreshold: { value: 0.3, validate: RED.validators.number() },
            iouThreshold: { value: 0.45, validate: RED.validators.number() },
            boxThickness: { value: 2, validate: RED.validators.number() },
            normalizedCoords: { value: false },
            colormap: { value: "jet" },
            threshold: { value: 0.5, validate: RED.validators.number() },
            pointRadius: { value: 3, validate: RED.validators.number() },
            kpThreshold: { value: 0.5, validate: RED.validators.number() },
            skeleton: { value: "" },
            polygonClosed: { value: true },
            palette: { value: "" },
            classLabels: { value: "" },
            editorPreview: { value: true },
            previewWidth: { value: 200, validate: RED.validators.number() },
            zoomWidth: { value: 500, validate: RED.validators.number() }
        },
        inputs: 1,
        outputs: 1,
        icon: "icon.png",
        label: function () { return this.name || ("vision: " + (this.mode || "boxes")); },
        labelStyle: function () { return this.name ? "node_label_italic" : ""; },
        paletteLabel: "Vision Annotator",
        oneditprepare: function () {
            const $mode = $("#node-input-mode");
            function refresh() {
                const m = $mode.val();
                $(".va-box").toggle(m === "boxes" || m === "obb");
                $(".va-yolo").toggle(m === "boxes");
                $(".va-overlay").toggle(["segmentation", "instances", "heatmap", "anomaly"].indexOf(m) >= 0);
                $(".va-cmap").toggle(m === "heatmap" || m === "anomaly");
                $(".va-thr").toggle(m === "anomaly");
                $(".va-kp").toggle(m === "keypoints");
                $(".va-poly").toggle(m === "polygons");
            }
            $mode.on("change", refresh);
            refresh();
        }
    });
</script>

<script type="text/html" data-help-name="vision-annotator">
    <p>Renders an image-model output as an image. Modes: <b>boxes</b>, <b>obb</b>,
    <b>segmentation</b>, <b>instances</b>, <b>polygons</b>, <b>keypoints</b>,
    <b>heatmap</b>, <b>anomaly</b>, <b>classification</b>.</p>
    <h3>Input</h3>
    <ul>
        <li><code>msg.prediction</code> — model output tensor (flat or nested).</li>
        <li><code>msg.mlInference.outputShape</code> — tensor shape (set by ml-inference).</li>
        <li><code>msg.image</code> — optional source image (PNG buffer) to draw on.</li>
    </ul>
    <h3>Output</h3>
    <ul>
        <li><code>msg.payload</code> — annotated PNG <code>Buffer</code>.</li>
        <li><code>msg.annotations</code> — structured result (boxes / instances / polygons /
        keypoints / regions / class metrics incl. areas, lengths, counts).</li>
    </ul>
    <p>With <b>Editor preview</b> on, the annotated image is drawn live as a
    thumbnail under this node on the canvas after each message. <b>Double-click</b>
    the thumbnail to enlarge it (to <i>zoom</i> width) and double-click again to
    shrink it back.</p>
</script>

<script type="text/javascript">
    // Live in-editor thumbnail under the vision-annotator node (self-contained;
    // mirrors the node-red-contrib-image-output rendering on a private topic).
    (function () {
        const W = (node) => (node && parseInt(node.previewWidth, 10)) || 200;
        const Z = (node) => (node && parseInt(node.zoomWidth, 10)) || 500;
        const latest = {};
        const zoomed = {}; // node id -> true when enlarged

        function remove(id) {
            const $img = document.getElementById("va-img-" + id);
            const $b = document.getElementById("va-bubble-" + id);
            if ($img) $img.remove();
            if ($b) $b.remove();
            delete latest[id];
        }

        function render(id, data, node) {
            if (!data) { remove(id); return; }
            const width = zoomed[id] ? Z(node) : W(node);
            const i = new Image();
            let $img = document.getElementById("va-img-" + id);
            if (!$img) {
                const $c = document.getElementById(id);
                if (!$c) { return; }
                const bubble = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
                bubble.setAttribute("id", "va-bubble-" + id);
                bubble.setAttribute("style", "fill:#11141a");
                bubble.setAttribute("stroke", "#9482f1");
                $c.insertBefore(bubble, $c.lastChild.nextSibling);
                const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                img.setAttribute("id", "va-img-" + id);
                img.setAttribute("x", "0");
                img.setAttribute("y", "45");
                img.style.cursor = "zoom-in";
                // double-click toggles enlarge / restore
                img.addEventListener("dblclick", function (ev) {
                    ev.preventDefault();
                    zoomed[id] = !zoomed[id];
                    img.style.cursor = zoomed[id] ? "zoom-out" : "zoom-in";
                    render(id, latest[id], RED.nodes.node(id));
                });
                $c.insertBefore(img, $c.lastChild.nextSibling);
                $img = img;
            }
            $img.setAttribute("width", width);
            i.onload = function () {
                const h = Math.round(width * i.height / i.width);
                $img.setAttribute("height", h);
                const $b = document.getElementById("va-bubble-" + id);
                if ($b) {
                    const top = 47, bottom = 45 + h, right = width;
                    $b.setAttribute("points", "4," + (top - 17) + " 4," + top + " " + right + "," + top + " " + right + "," + bottom + " 0," + bottom + " 0," + (top - 21));
                }
            };
            $img.setAttribute("href", "data:image/png;base64," + data);
            i.src = "data:image/png;base64," + data;
        }

        RED.events.on("editor:save", function (node) { if (latest[node.id]) render(node.id, latest[node.id], node); });
        // per-node topic + wildcard so retained thumbnails replay on (re)connect
        RED.comms.subscribe("vision-annotator-preview/#", function (event, data) {
            if (data && data.hasOwnProperty("data")) {
                latest[data.id] = data.data;
                render(data.id, data.data, RED.nodes.node(data.id));
            } else if (data) {
                remove(data.id);
            }
        });
        // watchdog: if a canvas redraw (pan/zoom/deploy) wiped the thumbnail,
        // redraw it from the cache so it stays visible until dismissed.
        setInterval(function () {
            for (const id in latest) {
                if (!document.getElementById("va-img-" + id) && RED.nodes.node(id)) {
                    render(id, latest[id], RED.nodes.node(id));
                }
            }
        }, 1500);
    })();
</script>
