services:
  node-red:
    image: nodered/node-red:latest-debian
    container_name: node-red-condition-monitoring
    user: "1000:1000"
    ports:
      - "${NODE_RED_PORT:-1880}:1880"
    volumes:
      # Node-RED Daten (Flows, Settings)
      - ./node-red-data:/data
      # Alle node_modules auf einmal mounten (statt jedes Paket einzeln)
      - ./node_modules:/data/node_modules
      # Dein Modul direkt in node_modules mounten (genestet über dem node_modules-Mount)
      - ./nodes:/data/node_modules/node-red-contrib-condition-monitoring/nodes
      - ./package.json:/data/node_modules/node-red-contrib-condition-monitoring/package.json
      # ML model artifacts (for ml-inference)
      - ./test-models:/data/models
    environment:
      - NODE_OPTIONS=--max_old_space_size=4096
      - TZ=Europe/Berlin
    restart: unless-stopped
    networks:
      - node-red-network

networks:
  node-red-network:
    driver: bridge

